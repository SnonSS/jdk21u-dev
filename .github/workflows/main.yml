name: 'OpenJDK Build'

on:
  push:
    branches-ignore:
      - master
  workflow_dispatch:

jobs:
  prepare:
    name: 'Prepare the run'
    runs-on: self-hosted
    outputs:
      linux-x64: 'true'
      macos-aarch64: 'true'
      windows-x64: 'true'
      # Заглушки, чтобы не ломать логику оригинальных скриптов
      linux-x86-hs: 'false'
      linux-x64-variants: 'false'
      linux-cross-compile: 'false'
      macos-x64: 'false'
      windows-aarch64: 'false'
      docs: 'false'
    steps:
      - name: 'Checkout'
        uses: actions/checkout@v4

      # ВОТ ЭТОТ ШАГ НУЖЕН, ЧТОБЫ ТЕСТЫ НЕ ПАДАЛИ
      - name: 'Build JTReg'
        uses: ./.github/actions/build-jtreg

  build-linux-x64:
    name: linux-x64
    needs: prepare
    if: needs.prepare.outputs.linux-x64 == 'true'
    uses: ./.github/workflows/build-linux.yml
    with:
      platform: linux-x64
      gcc-major-version: '10'

  build-macos-aarch64:
    name: macos-aarch64
    needs: prepare
    if: needs.prepare.outputs.macos-aarch64 == 'true'
    uses: ./.github/workflows/build-macos.yml
    with:
      platform: macos-aarch64
      runs-on: 'macos-15'
      xcode-toolset-version: '16.4'

  build-windows-x64:
    name: windows-x64
    needs: prepare
    if: needs.prepare.outputs.windows-x64 == 'true'
    uses: ./.github/workflows/build-windows.yml
    with:
      platform: windows-x64
      msvc-toolset-version: '14.44'
      msvc-toolset-architecture: 'x86.x64'

  # Тесты теперь найдут свой jtreg
  test-linux-x64:
    name: linux-x64
    needs: [prepare, build-linux-x64]
    uses: ./.github/workflows/test.yml
    with:
      platform: linux-x64
      bootjdk-platform: linux-x64
      runs-on: ubuntu-22.04
